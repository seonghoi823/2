<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문자/이미지 진단</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <nav>
    <a href="/" data-i18n="nav_home">실시간 진단</a>
    <a href="/recordings.html" data-i18n="nav_list">저장 목록</a>
    <a href="/text_checker.html" data-i18n="nav_text">문자/이미지 진단</a>
    <button id="loginBtn" style="margin-left: 20px;"></button>
  </nav>

  <div class="container">
    <h1 data-i18n="text_title">문자/이미지 사기 진단</h1>
    <p data-i18n="text_desc">의심되는 문자나 이미지(캡처본)를 업로드하세요.</p>
    <textarea id="textInput" data-i18n="placeholder_text"></textarea>
    <div style="margin-bottom: 20px;">
      <label for="imageInput" style="display: block; margin-bottom: 10px; font-size: 14px; color: #666;" data-i18n="label_image">이미지 업로드:</label>
      <input type="file" id="imageInput" accept="image/*">
    </div>
    <button id="checkButton" data-i18n="btn_check">사기 여부 진단하기</button>
    <div style="margin-top: 20px;">
      <p>결과: <span id="result">-</span></p>
    </div>
  </div>

  <div class="settings-bar">
    <button id="themeToggle" data-i18n="btn_theme">테마 변경</button>
    <button id="langToggle" data-i18n="btn_lang">English</button>
  </div>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
